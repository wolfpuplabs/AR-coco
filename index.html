<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Griffin AR</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #ui { 
            position: absolute; bottom: 30px; width: 100%; text-align: center; 
            z-index: 10; pointer-events: none; color: white; 
            font-family: sans-serif; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>WebXR Griffin AR</h2>
        <p>Arahkan kamera ke lantai & tap untuk menaruh Griffin</p>
    </div>

    <a-scene webxr="optionalFeatures: hit-test, local-floor;" 
             renderer="colorManagement: true;">
        
        <a-camera position="0 1.6 0"></a-camera>

        <a-entity id="griffin" 
                  gltf-model="url(https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb)" 
                  scale="0.5 0.5 0.5" 
                  position="0 0 -1"
                  animation-mixer="clip: *; loop: repeat; autoplay: true;">
        </a-entity>

    </a-scene>

</body>
</html>
