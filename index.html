<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding: 20px; }
        #input-section { margin-top: 50px; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; font-size: 16px; }
        #ar-btn { display: none; margin-top: 20px; padding: 20px 40px; background: #e74c3c; border: none; border-radius: 30px; color: white; font-size: 18px; }
    </style>
</head>
<body>

    <h1>Selamat Datang di AR Griffin</h1>
    
    <div id="input-section">
        <input type="text" id="chatInput" placeholder="Ketik pesan untuk Griffin..." oninput="checkInput()">
        <br>
        <button id="ar-btn" onclick="openAR()">Lihat Griffin Beraksi!</button>
    </div>

    <model-viewer 
        id="griffin-viewer"
        src="https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb" 
        ar 
        ar-modes="quick-look" 
        style="display:none;">
    </model-viewer>

    <script>
        function checkInput() {
            const val = document.getElementById('chatInput').value;
            if(val.length > 0) {
                document.getElementById('ar-btn').style.display = 'inline-block';
            }
        }

        function openAR() {
            const chatVal = document.getElementById('chatInput').value;
            const viewer = document.getElementById('griffin-viewer');
            
            // Memberi nama/deskripsi pada mode AR (akan terlihat di AR Quick Look Apple)
            viewer.setAttribute('ar-title', 'Griffin: ' + chatVal);
            
            // Memaksa aktivasi AR
            viewer.activateAR();
        }
    </script>
</body>
</html>
