<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin AR Chat</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #controls { 
            position: absolute; bottom: 20px; width: 100%; display: flex; 
            justify-content: center; z-index: 999; 
        }
        input { padding: 12px; width: 60%; border-radius: 10px; border: 1px solid #ccc; }
        button { padding: 12px 20px; margin-left: 10px; border-radius: 10px; background: #4CAF50; color: white; border: none; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="text" id="msg" placeholder="Tulis pesan untuk Griffin...">
        <button onclick="updateText()">Kirim</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        
        <a-entity id="griffin" 
                  gltf-model="url(https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb)" 
                  scale="0.2 0.2 0.2" 
                  position="0 -1 -2"
                  animation-mixer>
            
            <a-plane position="0 8 0" width="10" height="3" color="#ffffff" opacity="0.9"></a-plane>
            
            <a-text id="chat-text" value="Halo!" position="0 8 0.1" align="center" color="black" scale="6 6 6"></a-text>
        </a-entity>

        <a-camera></a-camera>
    </a-scene>

    <script>
        function updateText() {
            const val = document.getElementById('msg').value;
            if(val) {
                document.getElementById('chat-text').setAttribute('value', val);
                document.getElementById('msg').value = '';
            }
        }
    </script>
</body>
</html>
