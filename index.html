<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hatch Your Dragon</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #2c3e50; color: white; font-family: sans-serif; }
        model-viewer { width: 100%; height: 500px; }
        button { padding: 20px 40px; font-size: 18px; border-radius: 30px; border: none; background: #e74c3c; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Siap untuk Menetas?</h1>
    
    <model-viewer 
        id="dragon-model"
        src="https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb" 
        ar 
        ar-modes="quick-look" 
        camera-controls 
        auto-rotate>
        
        <button slot="ar-button" style="background-color: #e74c3c; border: none; padding: 15px 30px; border-radius: 20px; color: white;">
            Hatch the Egg (Lihat di AR)
        </button>
    </model-viewer>

</body>
</html>
