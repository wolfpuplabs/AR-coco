<!DOCTYPE html>
<html>
<head>
    <title>WebAR Dragon Pet</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-layer {
            position: absolute; top: 10px; width: 100%; text-align: center; z-index: 999;
        }
        #chat-box { position: absolute; bottom: 20px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2 id="status">Tap layar untuk memunculkan telur</h2>
    </div>

    <div id="chat-box">
        <input type="text" id="userInput" placeholder="Tulis pesan untuk naga...">
        <button onclick="updateBubble()">Kirim</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        
        <a-entity id="dragon-container" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
            <a-entity id="dragon" gltf-model="url(path-to-your-dragon.glb)" scale="0.5 0.5 0.5" visible="false">
                <a-text id="chat-bubble" value="Halo!" position="0 2 0" align="center" color="black" scale="2 2 2"></a-text>
            </a-entity>
        </a-entity>

        <a-camera></a-camera>
    </a-scene>

    <script>
        // Logika sederhana untuk memunculkan naga
        const scene = document.querySelector('a-scene');
        const dragon = document.querySelector('#dragon');
        const chatBubble = document.querySelector('#chat-bubble');

        scene.addEventListener('click', () => {
            if (!dragon.getAttribute('visible')) {
                dragon.setAttribute('visible', true);
                document.getElementById('status').innerText = "Naga muncul!";
            }
        });

        function updateBubble() {
            const text = document.getElementById('userInput').value;
            chatBubble.setAttribute('value', text);
            
            // Logika Share (Sederhana menggunakan Web Share API)
            if (navigator.share) {
                navigator.share({
                    title: 'My Dragon Pet',
                    text: 'Lihat nagaku bilang: ' + text,
                    url: window.location.href,
                });
            }
        }
    </script>
</body>
</html>
