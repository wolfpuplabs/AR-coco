<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #000; }
        model-viewer { width: 100%; height: 100vh; }
        #instruction { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; }
    </style>
</head>
<body>

    <div id="instruction">
        <h1>Temukan Griffin-mu</h1>
        <p>Tekan tombol AR di bawah untuk menaruh di lantai</p>
    </div>

    <model-viewer 
        src="https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb" 
        ar 
        ar-modes="quick-look" 
        camera-controls 
        shadow-intensity="1">
        
        <button slot="ar-button" style="padding: 15px 30px; border-radius: 20px; background: #e74c3c; border: none; color: white; font-size: 18px;">
            Hatch the Griffin
        </button>
    </model-viewer>

</body>
</html>
