<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui { position: absolute; bottom: 20px; width: 100%; text-align: center; z-index: 10; }
        input { padding: 10px; width: 70%; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <input type="text" id="msg" placeholder="Pesan untuk Griffin...">
        <button onclick="updateText()">Kirim</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-entity id="griffin" gltf-model="url(https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb)" 
                  scale="0.2 0.2 0.2" position="0 -1 -2">
            <a-text id="chat-text" value="Halo!" position="0 2 0" align="center" color="white" scale="3 3 3"></a-text>
        </a-entity>

        <a-camera></a-camera>
    </a-scene>

    <script>
        function updateText() {
            const val = document.getElementById('msg').value;
            document.getElementById('chat-text').setAttribute('value', val);
        }
    </script>
</body>
</html>
