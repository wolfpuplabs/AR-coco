<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griffin AR Chat</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.1/model-viewer.min.js"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding: 20px; }
        #input-section { margin-top: 50px; }
        input { padding: 15px; width: 80%; border-radius: 10px; border: none; font-size: 16px; }
        #ar-btn { margin-top: 20px; padding: 20px 40px; background: #e74c3c; border: none; border-radius: 30px; color: white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>AR Griffin Chat</h1>
    
    <div id="input-section">
        <input type="text" id="chatInput" placeholder="Ketik pesan untuk Griffin...">
        <br>
        <model-viewer 
            id="griffin-viewer"
            src="https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/griffin.glb" 
            ar 
            ar-modes="quick-look" 
            camera-controls 
            style="width: 100%; height: 300px; display: none;">
            
            <button slot="ar-button" id="ar-btn">
                Lihat Griffin Beraksi!
            </button>
        </model-viewer>
    </div>

    <script>
        const input = document.getElementById('chatInput');
        const viewer = document.getElementById('griffin-viewer');

        // Munculkan tombol AR setelah user mengetik
        input.addEventListener('input', () => {
            if(input.value.length > 0) {
                viewer.style.display = 'block';
                // Update title di AR agar pesan user terbaca di atas AR Apple
                viewer.setAttribute('ar-title', 'Pesan: ' + input.value);
            }
        });
    </script>
</body>
</html>
