<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Dragon Pet Adventure</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        #ui-overlay {
            position: absolute; top: 20px; width: 100%; text-align: center;
            z-index: 999; color: white; pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #controls {
            position: absolute; bottom: 30px; width: 100%; display: flex;
            justify-content: center; gap: 10px; z-index: 1000;
        }

        input { padding: 12px; border-radius: 20px; border: none; width: 60%; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button { padding: 12px 20px; border-radius: 20px; border: none; background: #FF5722; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>Naga AR-ku</h1>
        <p>Arahkan kamera ke lantai & tap untuk menaruh naga</p>
    </div>

    <div id="controls">
        <input type="text" id="chatInput" placeholder="Ketik pesan...">
        <button onclick="sendChat()">Kirim</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; detectionMode: mono; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="dragon-anchor" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
            <a-entity id="dragon" gltf-model="url(https://raw.githubusercontent.com/wolfpuplabs/AR-coco/main/dragon.glb)" 
          scale="0.5 0.5 0.5" position="0 0 -2" visible="false">
    <a-text id="chat-text" value="Halo!" position="0 2 0" align="center" color="black" scale="2 2 2"></a-text>
</a-entity>

            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const dragon = document.querySelector('#dragon');
        const chatInput = document.querySelector('#chatInput');
        const chatBubble = document.querySelector('#chat-bubble');

        // Logic memunculkan naga saat layar disentuh
        document.querySelector('a-scene').addEventListener('click', function (e) {
            if (!dragon.getAttribute('visible')) {
                dragon.setAttribute('visible', true);
                // Di sini nanti bisa ditambahkan logika hit-test posisi
            }
        });

        function sendChat() {
            const text = chatInput.value;
            if (text) {
                chatBubble.setAttribute('value', text);
                chatInput.value = '';
                
                // Animasi sederhana: Naga melompat kecil saat di-chat
                dragon.setAttribute('animation', 'property: position; to: 0 0.2 0; dur: 500; dir: alternate; loop: 1');
            }
        }
    </script>
</body>
</html>
